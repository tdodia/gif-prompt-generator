<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GifForThat — Corporate Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --bg-subtle: #fcfcfb;
    --text: #37352f;
    --muted: #9b9a97;
    --border: #e9e9e7;
    --border-strong: #d9d9d6;
    --ink: #191919;
    --ink-hover: #000000;
    --accent: #ff5a36;
    --danger: #eb5757;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg-subtle);
    color: var(--text);
    min-height: 100vh;
    padding: 48px 20px 64px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 760px;
    margin: 0 auto;
  }
  h1 {
    font-family: 'Instrument Serif', Georgia, serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(2.6rem, 7vw, 4rem);
    line-height: 1.08;
    margin: 24px 0 10px;
    letter-spacing: -0.01em;
  }
  h1 .accent-text { color: var(--accent); }
  .edition-tag {
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin: 0 0 20px;
  }
  p.sub {
    color: var(--muted);
    margin-top: 0;
    margin-bottom: 28px;
    font-size: 1.05rem;
    font-weight: 500;
    max-width: 46ch;
  }
  .card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 20px;
  }
  .search-row {
    display: flex;
    gap: 8px;
  }
  input[type="text"] {
    flex: 1;
    padding: 10px 14px;
    border-radius: 6px;
    border: 1px solid var(--border-strong);
    background: var(--bg);
    color: var(--text);
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 500;
    outline: none;
    transition: border-color 0.12s ease, box-shadow 0.12s ease;
  }
  input[type="text"]::placeholder { color: var(--muted); font-weight: 400; }
  input[type="text"]:focus {
    border-color: var(--ink);
    box-shadow: 0 0 0 3px rgba(25,25,25,0.1);
  }
  button {
    padding: 10px 18px;
    border-radius: 6px;
    border: 1px solid transparent;
    background: var(--ink);
    color: white;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.12s ease;
    white-space: nowrap;
  }
  button:hover { background: var(--ink-hover); }
  button:active { background: #000000; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .chip-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }
  .chip {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border-strong);
    font-size: 0.82rem;
    font-weight: 600;
    padding: 7px 13px;
    border-radius: 999px;
  }
  .chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--bg);
  }
  .chip.surprise {
    border-color: var(--accent);
    color: var(--accent);
  }
  .chip.surprise:hover {
    background: var(--accent);
    color: white;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }
  .gif-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    transition: border-color 0.12s ease, box-shadow 0.12s ease;
  }
  .gif-card:hover {
    border-color: var(--border-strong);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .gif-card img {
    width: 100%;
    display: block;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    background: var(--bg-subtle);
  }
  .gif-card .overlay {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.0);
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    padding: 8px;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.12s ease;
  }
  .gif-card:hover .overlay {
    opacity: 1;
    background: linear-gradient(to top, rgba(0,0,0,0.35), transparent 60%);
  }
  .overlay button {
    padding: 6px 10px;
    font-size: 0.75rem;
    font-weight: 700;
    background: rgba(255,255,255,0.95);
    color: var(--text);
    border: none;
  }
  .overlay button:hover { background: white; }

  .caption-label {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 0 0 8px;
  }
  .caption-text {
    font-size: 0.95rem;
    font-weight: 500;
    line-height: 1.5;
    margin: 0;
  }
  .caption-card {
    display: none;
  }
  .caption-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .refresh-caption-btn {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border-strong);
  }
  .refresh-caption-btn:hover { background: var(--bg-subtle); }

  .status {
    color: var(--muted);
    text-align: center;
    padding: 40px 0;
    font-size: 0.9rem;
    font-weight: 500;
  }
  .status.error { color: var(--danger); font-weight: 600; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: white;
    padding: 9px 16px;
    border-radius: 6px;
    font-size: 0.85rem;
    opacity: 0;
    pointer-events: none;
    transition: all 0.2s ease;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  footer {
    text-align: center;
    color: var(--muted);
    font-size: 0.78rem;
    font-weight: 600;
    margin-top: 36px;
  }
  footer .giphy-word {
    font-weight: 800;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  @media (max-width: 480px) {
    .search-row { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>There's a GIF for <span class="accent-text">that.</span></h1>
  <p class="edition-tag">Corporate Edition</p>
  <p class="sub">Type what's happening at work — get the GIF and the corporate-approved caption to match.</p>

  <div class="card">
    <div class="search-row">
      <input type="text" id="promptInput" placeholder="e.g. when the deploy finally works" autocomplete="off" />
      <button id="searchBtn">Search</button>
    </div>
    <div class="chip-row" id="chipRow">
      <button type="button" class="chip" data-prompt="when the deploy finally works">deploy finally works</button>
      <button type="button" class="chip" data-prompt="monday morning">monday morning</button>
      <button type="button" class="chip" data-prompt="nailed the presentation">nailed the presentation</button>
      <button type="button" class="chip" data-prompt="waiting for a reply">waiting for a reply</button>
      <button type="button" class="chip surprise" id="surpriseBtn">Surprise me</button>
    </div>
  </div>

  <div class="card caption-card" id="captionCard">
    <p class="caption-label">Corporate translator</p>
    <p class="caption-text" id="captionText"></p>
    <div class="caption-actions">
      <button type="button" class="copy-caption-btn" id="copyCaptionBtn">Copy caption</button>
      <button type="button" class="refresh-caption-btn" id="refreshCaptionBtn">Try another</button>
    </div>
  </div>

  <div id="results"></div>

  <footer>Powered by <span class="giphy-word">GIPHY</span></footer>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {
  // Built-in GIPHY API key for this app — no signup needed to try it.
  const API_KEY = 'a8eAEhv6nsP8J9Dq4htUySQU3fzPjrZl';

  const SURPRISE_PROMPTS = [
    'when the deploy finally works',
    'monday morning',
    'nailed the presentation',
    'waiting for a reply',
    'friday at 5pm',
    'when the client wont stop emailing',
    'me pretending to understand',
    'accidentally reply all',
    'when the budget actually gets approved',
    'when the wifi comes back',
    'trying to look busy',
    'when the meeting could have been an email'
  ];

  const promptInput = document.getElementById('promptInput');
  const searchBtn = document.getElementById('searchBtn');
  const results = document.getElementById('results');
  const chipRow = document.getElementById('chipRow');
  const surpriseBtn = document.getElementById('surpriseBtn');
  const toast = document.getElementById('toast');
  const captionCard = document.getElementById('captionCard');
  const captionText = document.getElementById('captionText');
  const copyCaptionBtn = document.getElementById('copyCaptionBtn');
  const refreshCaptionBtn = document.getElementById('refreshCaptionBtn');
  let lastQuery = '';
  let searchId = 0;

  // Words that add noise to a search but no real search-term value.
  const STOPWORDS = new Set([
    'a','an','the','when','my','me','i','im',"i'm",'just','finally','is','are',
    'was','were','to','for','of','in','on','at','it','this','that','and','or',
    'but','so','got','get','gets','getting','be','being','been','with','about',
    'have','has','had','you','your','they','their','we','our','after','before',
    'up','out','over','again','really','very','still','some','one'
  ]);

  // Local, zero-API mood lexicon: if any trigger word shows up in the prompt,
  // blend in an extra search term GIPHY tends to have better coverage for,
  // and pair it with a business-speak caption for the same mood.
  // No AI call involved, purely a lookup table.
  const MOOD_MAP = [
    [['finally','done','works','worked','fixed','relief'], 'relief celebration',
      "Thrilled to share that this is now fully resolved and live."],
    [['monday','exhausted','tired','burnt out','burned out'], 'exhausted tired',
      "Kicking off the week with lots of exciting things in the pipeline!"],
    [['excited','hyped','pumped','cant wait',"can't wait"], 'excited hype',
      "Really looking forward to what's ahead here — great momentum."],
    [['nervous','anxious','waiting','worried'], 'anxious nervous waiting',
      "Keeping a close eye on this and will circle back with updates shortly."],
    [['angry','mad','rage','frustrated','furious'], 'frustrated angry rage',
      "Flagging some friction on our end — let's sync to align on next steps."],
    [['nailed','crushed it','proud','win','won','success'], 'celebration proud win',
      "Proud of the team for really knocking this one out of the park."],
    [['sad','upset','disappointed','bummed'], 'sad disappointed',
      "Wanted to share a quick update — this didn't land as planned, regrouping now."],
    [['confused','lost','what is happening','huh'], 'confused what',
      "Looping in for a bit of clarity here — happy to jump on a quick call."],
    [['double text','ghosted','left on read','reply'], 'waiting phone anxious',
      "Just following up on my note below — appreciate your time whenever you're free."],
    [['meeting','office','busy','work'], 'office tired busy',
      "Back-to-back today, but wanted to make sure this didn't fall through the cracks."],
    [['wifi','internet','connection','loading'], 'internet relief buffering',
      "Thanks for your patience — everything's back up and running smoothly."],
    [['money','broke','rich','paid'], 'money surprised excited',
      "Excited to share some good news on the budget front."],
    [['friday','weekend'], 'weekend excited',
      "Wrapping up a strong week — have a great one, everyone!"],
    [['presentation','pitch','demo'], 'confident presentation',
      "Great energy in the room today — thanks for engaging with the deck."],
    [['awkward','cringe','embarrassing'], 'awkward cringe',
      "Well, that's one for the highlight reel. Moving forward!"],
    [['micromanaging','micromanager','micromanage','micromanaged','breathing down my neck','hovering','watching my every move'], 'annoyed eye roll boss',
      "Appreciate the close collaboration and frequent check-ins on this."],
    [['toxic','underpaid','undervalued','no recognition','unappreciated'], 'unappreciated eye roll',
      "Would love to find some time to discuss growth and recognition."],
    [['could have been an email','death by powerpoint','zoning out','boring meeting'], 'bored zoning out meeting',
      "Let's take the rest offline to keep this efficient."],
    [['layoff','layoffs','restructuring','downsizing','let go'], 'nervous worried news',
      "Wanted to proactively share some context ahead of tomorrow's update."],
    [['deadline','crunch','behind schedule','running late'], 'stressed deadline rushing',
      "Working through a few final details — will have this wrapped shortly."],
    [['took credit','stole my idea','credit for my work'], 'annoyed unimpressed',
      "Glad this idea is getting the visibility it deserves."],
    [['not listening',"aren't listening",'arent listening','wont listen',"won't listen",'not being heard','feedback ignored','falls on deaf ears','brushed off','dismissed','nobody cares','no one cares'], 'ignored eye roll unheard',
      "Would love to find time to align so this feedback doesn't get lost."]
  ];

  // Generic business-speak fallbacks for prompts that don't match a mood.
  // These lean on recognizable corporate-jargon clichés (per my last email,
  // circling back, taking it offline...) rather than trying to sound like a
  // genuine relevant update — that's the part that can't work without real
  // language understanding, so the joke is the jargon itself instead.
  const GENERIC_CAPTIONS = [
    'Per my last email: {prompt}.',
    "Not to beat a dead horse, but let's revisit {prompt}.",
    'Circling back on {prompt} — more to come soon.',
    'Flagging {prompt} for visibility.',
    "Let's take {prompt} offline.",
    'Adding some context here on {prompt}.',
    'Just a heads up on {prompt} — happy to discuss further.',
    "Per our conversation, following up on {prompt}."
  ];

  function toTitleCase(str) {
    return str.replace(/\w\S*/g, w => w[0].toUpperCase() + w.slice(1));
  }

  // Strip leading filler ("when", "my", "the"...) so a raw sentence-like
  // prompt doesn't get stuffed awkwardly into a caption template.
  function cleanPromptForCaption(prompt) {
    let p = prompt.trim();
    let stripped = true;
    while (stripped) {
      stripped = false;
      for (const lead of ['when', 'my', 'the', 'a', 'an', "when my"]) {
        const re = new RegExp('^' + lead + '\\s+', 'i');
        if (re.test(p)) {
          p = p.replace(re, '');
          stripped = true;
        }
      }
    }
    return toTitleCase(p || prompt);
  }

  // Purely local, zero-API "business speak" caption generator — used as a
  // fallback if the real AI call (see fetchAIGenerate) fails for any
  // reason, so the feature never fully breaks. Matches the same mood
  // lexicon used for search, so caption and GIFs stay thematically linked.
  function generateLocalCaption(prompt, avoid) {
    const matches = [];
    for (const [triggers, , caption] of MOOD_MAP) {
      if (triggers.some(t => hasWord(prompt, t))) matches.push(caption);
    }
    if (matches.length) {
      const pool = matches.length > 1 && avoid ? matches.filter(c => c !== avoid) : matches;
      return pool[Math.floor(Math.random() * pool.length)];
    }
    const pool = GENERIC_CAPTIONS.length > 1 && avoid
      ? GENERIC_CAPTIONS.filter(t => t.replace('{prompt}', cleanPromptForCaption(prompt)) !== avoid)
      : GENERIC_CAPTIONS;
    const template = pool[Math.floor(Math.random() * pool.length)];
    return template.replace('{prompt}', cleanPromptForCaption(prompt));
  }

  // Real AI-generated caption AND GIF search terms, via the /api/caption
  // serverless function (keeps the Anthropic key server-side). Falls back to
  // the local heuristic generator/query builder if this fails for any reason.
  async function fetchAIGenerate(prompt, avoid) {
    try {
      const res = await fetch('/api/caption', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ prompt, avoid }),
      });
      if (!res.ok) throw new Error('caption request failed');
      const data = await res.json();
      if (!data.caption) throw new Error('no caption in response');
      const searchTerms = Array.isArray(data.searchTerms)
        ? data.searchTerms.filter(t => typeof t === 'string' && t.trim())
        : [];
      return { caption: data.caption, searchTerms };
    } catch (err) {
      return { caption: generateLocalCaption(prompt, avoid), searchTerms: [] };
    }
  }

  function extractKeywords(prompt) {
    const words = prompt
      .toLowerCase()
      .replace(/[^\w\s']/g, '')
      .split(/\s+/)
      .filter(w => w && !STOPWORDS.has(w));
    return words.slice(0, 5).join(' ');
  }

  function hasWord(text, trigger) {
    const escaped = trigger.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return new RegExp('\\b' + escaped + '\\b', 'i').test(text);
  }

  function moodQuery(prompt) {
    const matches = [];
    for (const [triggers, phrase] of MOOD_MAP) {
      if (triggers.some(t => hasWord(prompt, t)) && !matches.includes(phrase)) {
        matches.push(phrase);
      }
    }
    return matches.length ? matches.slice(0, 2).join(' ') : null;
  }

  // Build up to 3 query variants from one prompt, all fired at GIPHY's
  // existing free search endpoint — no external AI call, just smarter
  // use of the API we already have. Long, sentence-like prompts tend to
  // return weak/irrelevant results as a literal search, so for those we
  // skip the raw text entirely and lean on the cleaned-up variants.
  function buildQueries(prompt) {
    const wordCount = prompt.trim().split(/\s+/).filter(Boolean).length;
    const keywords = extractKeywords(prompt);
    const mood = moodQuery(prompt);
    const queries = [];

    if (wordCount <= 5) {
      queries.push(prompt);
    }
    if (keywords && !queries.some(q => q.toLowerCase() === keywords.toLowerCase())) {
      queries.push(keywords);
    }
    if (mood && !queries.some(q => q.toLowerCase() === mood.toLowerCase())) {
      queries.push(mood);
    }
    if (!queries.length) queries.push(prompt);
    return queries.slice(0, 3);
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  }

  function renderStatus(msg, isError) {
    results.innerHTML = '<div class="status' + (isError ? ' error' : '') + '">' + msg + '</div>';
  }

  function renderResults(gifs) {
    if (!gifs.length) {
      renderStatus('No GIFs found for that prompt. Try different words.');
      return;
    }
    const grid = document.createElement('div');
    grid.className = 'grid';
    gifs.forEach(g => {
      const url = g.images.fixed_height.url;
      const gifUrl = g.images.original.url;
      const card = document.createElement('div');
      card.className = 'gif-card';
      card.innerHTML =
        '<img src="' + url + '" alt="' + (g.title || 'gif').replace(/"/g, '') + '" loading="lazy" />' +
        '<div class="overlay">' +
          '<button type="button" class="copy-btn">Copy link</button>' +
          '<button type="button" class="open-btn">Open</button>' +
        '</div>';
      card.querySelector('.copy-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        navigator.clipboard.writeText(gifUrl).then(() => showToast('Link copied'));
      });
      card.querySelector('.open-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        window.open(gifUrl, '_blank');
      });
      grid.appendChild(card);
    });
    results.innerHTML = '';
    results.appendChild(grid);
  }

  // GIF IDs to always exclude, regardless of query. GIPHY sometimes boosts
  // sponsored/branded content (e.g. tied to current live events) across many
  // unrelated searches — this isn't a bug in our query logic, it's GIPHY's
  // own promotion showing up as "relevant." Add IDs here as they turn up.
  const BLOCKED_GIF_IDS = new Set([
    'UwtF7GNaaEF1vaMaz6' // "World Cup 2026 Football GIF by Respective" — sponsored, unrelated to any prompt
  ]);

  async function fetchGifs(query, limit) {
    const url = 'https://api.giphy.com/v1/gifs/search?api_key=' +
      encodeURIComponent(API_KEY) +
      '&q=' + encodeURIComponent(query) +
      '&limit=' + limit +
      '&rating=pg-13&lang=en';
    const res = await fetch(url);
    if (!res.ok) {
      const err = new Error('Request failed (' + res.status + ')');
      err.status = res.status;
      throw err;
    }
    const data = await res.json();
    return (data.data || []).filter(g => !BLOCKED_GIF_IDS.has(g.id));
  }

  // Merge multiple query result lists into one deduped list, interleaving
  // so no single query's results dominate the grid.
  function mergeResults(lists, cap) {
    const seen = new Set();
    const merged = [];
    let i = 0;
    while (merged.length < cap && lists.some(list => i < list.length)) {
      for (const list of lists) {
        if (merged.length >= cap) break;
        const gif = list[i];
        if (gif && !seen.has(gif.id)) {
          seen.add(gif.id);
          merged.push(gif);
        }
      }
      i++;
    }
    return merged;
  }

  async function search() {
    const query = promptInput.value.trim();
    if (!query) {
      showToast('Type a prompt first');
      return;
    }

    const myId = ++searchId;
    searchBtn.disabled = true;
    renderStatus('Thinking…');

    lastQuery = query;
    captionText.textContent = 'Translating…';
    captionCard.style.display = 'block';

    // Wait for the AI response before searching GIPHY — it supplies both
    // the caption and (when available) smarter search terms than the local
    // heuristic alone, so it's worth the extra ~1s before results appear.
    const ai = await fetchAIGenerate(query);
    if (myId !== searchId) return; // a newer search started, abandon this one

    captionText.textContent = ai.caption;
    renderStatus('Searching…');

    const queries = ai.searchTerms.length ? ai.searchTerms.slice(0, 3) : buildQueries(query);
    const perQueryLimit = Math.max(8, Math.ceil(24 / queries.length));

    const settled = await Promise.allSettled(
      queries.map(q => fetchGifs(q, perQueryLimit))
    );
    if (myId !== searchId) return; // a newer search started, abandon this one

    const successLists = settled
      .filter(r => r.status === 'fulfilled')
      .map(r => r.value);
    const failures = settled.filter(r => r.status === 'rejected');

    searchBtn.disabled = false;

    if (!successLists.length) {
      const status = failures[0] && failures[0].reason && failures[0].reason.status;
      if (status === 429) {
        renderStatus("This app hit GIPHY's rate limit — probably a lot of people testing at once. Try again in a minute.", true);
      } else if (status === 401 || status === 403) {
        renderStatus("This app's API key stopped working. Nothing to do on your end — let whoever built this know.", true);
      } else {
        renderStatus('Something went wrong. Try again in a moment.', true);
      }
      return;
    }

    renderResults(mergeResults(successLists, 24));
  }

  searchBtn.addEventListener('click', search);
  promptInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') search();
  });

  chipRow.addEventListener('click', (e) => {
    const chip = e.target.closest('.chip:not(.surprise)');
    if (!chip) return;
    promptInput.value = chip.dataset.prompt;
    search();
  });

  surpriseBtn.addEventListener('click', () => {
    const pick = SURPRISE_PROMPTS[Math.floor(Math.random() * SURPRISE_PROMPTS.length)];
    promptInput.value = pick;
    search();
  });

  copyCaptionBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(captionText.textContent).then(() => showToast('Caption copied'));
  });

  refreshCaptionBtn.addEventListener('click', () => {
    if (!lastQuery) return;
    const query = lastQuery;
    const previous = captionText.textContent;
    refreshCaptionBtn.disabled = true;
    captionText.textContent = 'Translating…';
    fetchAIGenerate(query, previous).then(ai => {
      captionText.textContent = ai.caption;
      refreshCaptionBtn.disabled = false;
    });
  });

  renderStatus('Enter a prompt above to find GIFs.');
})();
</script>
</body>
</html>
